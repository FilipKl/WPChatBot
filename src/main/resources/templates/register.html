<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:      #0d1117;
            --bg-surface:   #161b22;
            --bg-elevated:  #1c2333;
            --border:       #30363d;
            --accent:       #388bfd;
            --accent-dim:   #1f4068;
            --text-primary: #e6edf3;
            --text-secondary:#8b949e;
            --text-muted:   #484f58;
            --red:          #f85149;
            --red-dim:      #3d1a1a;
            --green:        #3fb950;
            --radius-lg:    14px;
            --radius-md:    8px;
            --radius-sm:    4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .auth-container {
            width: 100%;
            max-width: 380px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        /* ── Header ─────────────────────────────── */
        .auth-header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 32px 30px;
            text-align: center;
        }

        .auth-header-icon {
            font-size: 2.4rem;
            line-height: 1;
            margin-bottom: 12px;
        }

        .auth-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .auth-header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* ── Content ─────────────────────────────── */
        .auth-content {
            padding: 28px 30px;
        }

        /* ── Form ────────────────────────────────── */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            font-family: 'IBM Plex Mono', monospace;
        }

        .form-group input {
            padding: 10px 14px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
        }

        /* ── Error message ──────────────────────── */
        .error-message {
            padding: 12px 14px;
            background: var(--red-dim);
            border: 1px solid var(--red);
            border-radius: var(--radius-md);
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        /* ── Button ──────────────────────────────── */
        .btn-auth {
            padding: 11px 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn-auth:hover {
            background: #58a6ff;
        }

        .btn-auth:active {
            transform: scale(0.97);
        }

        /* ── Footer link ─────────────────────────── */
        .auth-footer {
            padding: 16px 30px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #58a6ff;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <h1>Sign Up</h1>
        <p>Create your ChatBot account</p>
    </div>

    <div class="auth-content">
        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter a password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn-auth">Create Account</button>
        </form>
    </div>

    <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>
</body>
</html>
