<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:      #0d1117;
            --bg-surface:   #161b22;
            --bg-elevated:  #1c2333;
            --border:       #30363d;
            --accent:       #388bfd;
            --accent-dim:   #1f4068;
            --text-primary: #e6edf3;
            --text-secondary:#8b949e;
            --text-muted:   #484f58;
            --red:          #f85149;
            --red-dim:      #3d1a1a;
            --green:        #3fb950;
            --radius-lg:    14px;
            --radius-md:    8px;
            --radius-sm:    4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        /* ── Header ─────────────────────────────── */
        .header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 32px 30px;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-icon {
            font-size: 2.4rem;
            line-height: 1;
        }

        .header-text h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .header-text p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 3px;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* ── Content ─────────────────────────────── */
        .content { padding: 28px 30px; }

        /* ── Create chat ─────────────────────────── */
        .create-section {
            margin-bottom: 32px;
        }

        .section-label {
            font-size: 0.72rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-row input {
            flex: 1;
            padding: 10px 15px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-row input::placeholder { color: var(--text-muted); }

        .form-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
        }

        .btn-create {
            padding: 10px 22px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .btn-create:hover  { background: #58a6ff; }
        .btn-create:active { transform: scale(0.97); }

        /* ── Chats list ──────────────────────────── */
        .chats-section { }

        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s, background 0.2s;
        }

        .chat-item:hover {
            border-color: var(--accent);
            background: var(--bg-base);
        }

        .chat-info { flex: 1; min-width: 0; }

        .chat-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.92rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            margin-top: 3px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            margin-left: 16px;
        }

        .btn-open {
            padding: 7px 14px;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-open:hover { background: var(--accent); color: #fff; }

        .btn-delete {
            padding: 7px 14px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: var(--red-dim);
            color: var(--red);
            border-color: var(--red);
        }

        /* ── Empty state ─────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon { font-size: 2rem; margin-bottom: 12px; }
        .empty-state p    { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 4px; }
        .empty-state small{ font-size: 0.82rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-icon">🤖</div>
        <div class="header-text">
            <h1>ChatBot</h1>

        </div>
    </div>

    <div class="content">
        <!-- Create new chat -->
        <div class="create-section">
            <div class="section-label">New conversation</div>
            <form method="POST" action="/chat/create" class="form-row">
                <input type="text" name="title" placeholder="Give this chat a name…" required>
                <button type="submit" class="btn-create">+ Create</button>
            </form>
        </div>

        <!-- Chat list -->
        <div class="chats-section">
            <div class="section-label">Your chats</div>

            <div class="chats-list" th:if="${!chats.isEmpty()}">
                <div class="chat-item" th:each="chat : ${chats}">
                    <div class="chat-info">
                        <div class="chat-title" th:text="${chat.title}">Chat Title</div>
                        <div class="chat-date"
                             th:text="${#temporals.format(chat.createdAt, 'dd MMM yyyy · HH:mm')}">Date</div>
                    </div>
                    <div class="chat-actions">
                        <form method="GET" th:action="'/chat/' + ${chat.id}" style="display:inline;">
                            <button type="submit" class="btn-open">Open →</button>
                        </form>
                        <form method="POST" th:action="'/chat/' + ${chat.id} + '/delete'"
                              style="display:inline;"
                              onsubmit="return confirm('Delete this chat?');">
                            <button type="submit" class="btn-delete">Delete</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${chats.isEmpty()}">
                <div class="empty-state-icon">💬</div>
                <p>No chats yet</p>
                <small>Create one above to get started</small>
            </div>
        </div>
    </div>
</div>
</body>
</html>
