<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:      #0d1117;
            --bg-surface:   #161b22;
            --bg-elevated:  #1c2333;
            --bg-bubble-ai: #1e2d40;
            --border:       #30363d;
            --accent:       #388bfd;
            --accent-dim:   #1f4068;
            --text-primary: #e6edf3;
            --text-secondary:#8b949e;
            --text-muted:   #484f58;
            --user-bubble:  #1f6feb;
            --user-text:    #ffffff;
            --green:        #3fb950;
            --red:          #f85149;
            --yellow:       #d29922;
            --radius-lg:    14px;
            --radius-md:    8px;
            --radius-sm:    4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: stretch;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 32px);
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        /* ── Header ─────────────────────────────── */
        .header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--green);
        }

        .status-dot::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--green);
        }

        .btn-back {
            padding: 7px 14px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            background: var(--bg-base);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        /* ── Messages ────────────────────────────── */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message {
            display: flex;
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }
        .message.ai   { justify-content: flex-start; }

        .message-bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: var(--radius-lg);
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.55;
            font-size: 0.9rem;
            white-space: normal;
            overflow-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: var(--radius-sm);
        }

        .message.ai .message-bubble {
            background: var(--bg-bubble-ai);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: var(--radius-sm);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 0.72rem;
            font-family: 'IBM Plex Mono', monospace;
        }

        .message.user .message-header { justify-content: flex-end; }

        .role-label {
            font-weight: 500;
            text-transform: lowercase;
        }

        .message.user  .role-label { color: rgba(255,255,255,0.6); }
        .message.ai    .role-label { color: var(--accent); }

        .message-time  { color: var(--text-muted); }
        .message-edited { color: var(--yellow); font-style: italic; }

        .message-content {
            white-space: normal;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            line-height: 1.55;
        }

        /* ── Typing indicator ────────────────────── */
        .typing-indicator {
            display: flex;
            justify-content: flex-start;
            animation: slideUp 0.25s ease;
        }

        .typing-bubble {
            background: var(--bg-bubble-ai);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            border-bottom-left-radius: var(--radius-sm);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-indicator-inline {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0);    opacity: 0.4; }
            30%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Edit form ───────────────────────────── */
        .message.ai .edit-form {
            display: none;
            margin-top: 10px;
        }

        .message.ai.editing .message-content { display: none; }
        .message.ai.editing .edit-form       { display: block; }
        .message.ai.editing .message-actions { display: none; }

        .edit-form textarea {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.88rem;
            resize: vertical;
            min-height: 70px;
        }

        .edit-form textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .edit-form-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-save, .btn-cancel {
            flex: 1;
            padding: 7px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-save   { background: var(--green);  color: #000; }
        .btn-cancel { background: var(--bg-base); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-save:hover, .btn-cancel:hover { opacity: 0.8; }

        /* ── Message actions ─────────────────────── */
        .message-actions {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }

        .btn-edit {
            padding: 4px 10px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ── Input area ──────────────────────────── */
        .input-area {
            padding: 16px 20px;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-area form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 11px 16px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-area input::placeholder { color: var(--text-muted); }

        .input-area input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
        }

        .send-btn {
            padding: 11px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.88rem;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .send-btn:hover    { background: #58a6ff; }
        .send-btn:active   { transform: scale(0.97); }
        .send-btn:disabled { background: var(--border); cursor: not-allowed; }

        /* ── Empty state ─────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 8px;
            text-align: center;
        }

        .empty-state-icon { font-size: 2.5rem; margin-bottom: 4px; }
        .empty-state p    { font-size: 0.95rem; color: var(--text-secondary); }
        .empty-state small{ font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">🤖</div>
            <div>
                <h1 th:text="${chat.title}">Chat Title</h1>
                <div class="status-dot">online</div>
            </div>
        </div>
        <a href="/" class="btn-back">← Back</a>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">

        <div th:if="${!messages.isEmpty()}">
            <div class="message"
                 th:each="msg : ${messages}"
                 th:classappend="${msg.role.name() == 'USER' ? 'user' : 'ai'}"
                 th:id="'message-' + ${msg.id}">
                <div class="message-bubble">
                    <div class="message-header">
                        <span class="role-label" th:text="${msg.role.name() == 'USER' ? 'you' : 'assistant'}">role</span>
                        <span class="message-time" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}">00:00</span>
                        <span class="message-edited" th:if="${msg.edited}">(edited)</span>
                    </div>

                    <div class="message-content" th:text="${msg.content}">Message content</div>

                    <!-- Edit form (AI only) -->
                    <div class="edit-form" th:if="${msg.role.name() == 'AI'}">
                        <form method="POST" th:action="'/message/' + ${msg.id} + '/edit'" style="display: contents;">
                            <textarea name="newContent" th:text="${msg.content}" required></textarea>
                            <div class="edit-form-buttons">
                                <button type="submit" class="btn-save">Save</button>
                                <button type="button" class="btn-cancel" onclick="cancelEdit(this)">Cancel</button>
                            </div>
                        </form>
                    </div>

                    <!-- Edit button (AI only) -->
                    <div class="message-actions" th:if="${msg.role.name() == 'AI'}">
                        <button type="button" class="btn-edit" onclick="toggleEdit(this)">✏ edit</button>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${messages.isEmpty()}" class="empty-state">
            <div class="empty-state-icon">💬</div>
            <p>No messages yet</p>
            <small>Start the conversation below</small>
        </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
        <form method="POST" th:action="'/chat/' + ${chat.id} + '/send'" id="chatForm">
            <input type="text" name="content" id="messageInput"
                   placeholder="Type a message…" required autocomplete="off">
            <button type="submit" class="send-btn" id="sendBtn">
                Send ↑
            </button>
        </form>
    </div>
</div>

<script>
    // ── Scroll to bottom ──────────────────────────────────
    const container = document.getElementById('messagesContainer');
    container.scrollTop = container.scrollHeight;

    // ── Typing indicator on send ──────────────────────────
    const form  = document.getElementById('chatForm');
    const input = document.getElementById('messageInput');
    const btn   = document.getElementById('sendBtn');
    const chatId = window.location.pathname.split('/').pop();

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const userMessage = input.value;
        if (!userMessage.trim()) return;

        input.value = '';
        btn.disabled = true;
        btn.textContent = '…';

        // Add user message to UI
        const userMessageDiv = document.createElement('div');
        userMessageDiv.className = 'message user';
        userMessageDiv.innerHTML = `
            <div class="message-bubble">
                <div class="message-header">
                    <span class="role-label">you</span>
                    <span class="message-time">${new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
                <div class="message-content">${escapeHtml(userMessage)}</div>
            </div>
        `;
        container.appendChild(userMessageDiv);

        // Add AI message bubble with three dots
        const aiMessageDiv = document.createElement('div');
        aiMessageDiv.className = 'message ai';
        aiMessageDiv.id = 'aiMessage';
        aiMessageDiv.innerHTML = `
            <div class="message-bubble">
                <div class="message-header">
                    <span class="role-label">assistant</span>
                    <span class="message-time">${new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
                <div class="message-content">
                    <div class="typing-indicator-inline">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(aiMessageDiv);
        container.scrollTop = container.scrollHeight;

        try {
            // Send message to backend
            const response = await fetch('/chat/' + chatId + '/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'content=' + encodeURIComponent(userMessage)
            });

            if (!response.ok) {
                throw new Error('Failed to send message');
            }

            // Get updated messages from the page
            const redirectUrl = response.url;
            const redirectResponse = await fetch(redirectUrl);
            const html = await redirectResponse.text();

            // Parse the response to find the last AI message
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const messages = doc.querySelectorAll('.message.ai');
            const lastMessage = messages[messages.length - 1];

            if (lastMessage) {
                const newContent = lastMessage.querySelector('.message-content').textContent;
                const msgId = lastMessage.id.replace('message-', '');

                // Update the AI message with word-by-word typing effect
                const contentDiv = aiMessageDiv.querySelector('.message-content');
                contentDiv.innerHTML = '';

                // Display response word by word
                await typeWordByWord(contentDiv, newContent);

                // Add edit form and button
                const messageBubble = aiMessageDiv.querySelector('.message-bubble');

                // Create edit form
                const editFormDiv = document.createElement('div');
                editFormDiv.className = 'edit-form';
                editFormDiv.innerHTML = `
                    <form method="POST" action="/message/${msgId}/edit" style="display: contents;">
                        <textarea name="newContent" required>${escapeHtml(newContent)}</textarea>
                        <div class="edit-form-buttons">
                            <button type="submit" class="btn-save">Save</button>
                            <button type="button" class="btn-cancel" onclick="cancelEdit(this)">Cancel</button>
                        </div>
                    </form>
                `;
                messageBubble.appendChild(editFormDiv);

                // Add edit button
                const editButtonDiv = document.createElement('div');
                editButtonDiv.className = 'message-actions';
                editButtonDiv.innerHTML = '<button type="button" class="btn-edit" onclick="toggleEdit(this)">✏ edit</button>';
                messageBubble.appendChild(editButtonDiv);

                // Set message ID
                aiMessageDiv.id = 'message-' + msgId;
            }

            btn.disabled = false;
            btn.textContent = 'Send ↑';
            container.scrollTop = container.scrollHeight;

        } catch (error) {
            console.error('Error:', error);
            btn.disabled = false;
            btn.textContent = 'Send ↑';
            alert('Error sending message. Please try again.');
        }
    });

    // ── Escape HTML to prevent XSS ──────────────────────
    function escapeHtml(unsafe) {
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // ── Type word by word effect ─────────────────────────
    async function typeWordByWord(element, text, delayMs = 50) {
        const words = text.split(' ');
        let currentText = '';

        for (let i = 0; i < words.length; i++) {
            currentText += (i > 0 ? ' ' : '') + words[i];
            element.textContent = currentText;

            // Scroll to bottom to follow typing
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;

            // Wait for the specified delay before showing next word
            await new Promise(resolve => setTimeout(resolve, delayMs));
        }
    }

    // ── Edit helpers ──────────────────────────────────────
    function toggleEdit(button) {
        button.closest('.message').classList.toggle('editing');
    }

    function cancelEdit(button) {
        button.closest('.message').classList.remove('editing');
    }
</script>
</body>
</html>
