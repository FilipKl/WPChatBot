<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:      #0d1117;
            --bg-surface:   #161b22;
            --bg-elevated:  #1c2333;
            --border:       #30363d;
            --accent:       #388bfd;
            --text-primary: #e6edf3;
            --text-secondary:#8b949e;
            --text-muted:   #484f58;
            --red:          #f85149;
            --red-dim:      #3d1a1a;
            --radius-lg:    14px;
            --radius-md:    8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--red);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .error-icon {
            width: 56px;
            height: 56px;
            background: var(--red-dim);
            border: 1px solid var(--red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 20px;
        }

        .error-code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 24px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.88rem;
            transition: background 0.2s;
        }

        .btn-back:hover { background: #58a6ff; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon">⚠️</div>
    <div class="error-code">error</div>
    <h1>Something went wrong</h1>
    <div class="error-message" th:if="${error}"  th:text="${error}">Error message here</div>
    <div class="error-message" th:unless="${error}">Please try again or go back to the home page.</div>
    <a href="/" class="btn-back">← Back to Home</a>
</div>
</body>
</html>
